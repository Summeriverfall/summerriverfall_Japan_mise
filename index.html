<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tokyo Relaxation Salons</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Noto Sans JP", sans-serif;
      background: #faf7f2;
      color: #2c2c2c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.25rem;
    }
    h1 {
      font-family: "Cormorant Garamond", serif;
      font-weight: 500;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
      text-align: center;
    }
    .sub { color: #8a7f72; font-size: 0.95rem; margin-bottom: 2.5rem; letter-spacing: 0.04em; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 860px;
    }
    a.card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: #fff;
      border: 1px solid rgba(184,149,107,0.18);
      border-radius: 14px;
      padding: 1.4rem 1.5rem;
      transition: transform .2s, box-shadow .2s, border-color .2s;
    }
    a.card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(44,44,44,0.08);
      border-color: #b8956b;
    }
    .name { font-size: 1.15rem; font-weight: 600; margin-bottom: 0.25rem; }
    .area { font-size: 0.82rem; color: #b8956b; letter-spacing: 0.08em; text-transform: uppercase; }
    footer { margin-top: 3rem; font-size: 0.8rem; color: #a99e90; text-align: center; }
    footer a { color: #b8956b; text-decoration: none; }
  </style>
</head>
<body>
  <h1>Tokyo Relaxation Salons</h1>
  <p class="sub">東京・リラクゼーションサロン &middot; 6 stores</p>
  <div class="grid">
    <a class="card" href="ichiryu-shibuya/">
      <div class="name">Ichiryu Shibuya</div><div class="area">Shibuya &middot; 一龍 渋谷店</div>
    </a>
    <a class="card" href="ichiryu-shinjuku/">
      <div class="name">Ichiryu Shinjuku</div><div class="area">Shinjuku &middot; 一龍 新宿東口店</div>
    </a>
    <a class="card" href="aromahot-ikebukuro/">
      <div class="name">Aroma Hot Ikebukuro</div><div class="area">Ikebukuro &middot; AROMA HOT 池袋店</div>
    </a>
    <a class="card" href="aromahot-ueno/">
      <div class="name">Aroma Hot Ueno</div><div class="area">Ueno &middot; AROMA HOT 上野店</div>
    </a>
    <a class="card" href="fukurai/">
      <div class="name">Fukurai</div><div class="area">Shibuya Dogenzaka &middot; 福来</div>
    </a>
    <a class="card" href="refrest/">
      <div class="name">Refrest</div><div class="area">Shibuya &middot; Refrest 渋谷</div>
    </a>
  </div>
  <footer>Powered by <a href="https://reserveinjp.com/" target="_blank" rel="noopener">reserveinjp.</a></footer>
</body>
</html>
